<!DOCTYPE html>
<html>
<head>
<title>Qingdao</title>
<meta charset="utf-8">
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: Arial, sans-serif;
}
a {
  text-decoration: none;
  color: inherit;
}
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  padding: 20px 40px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.top-bar .logo {
  font-size: 16px;
  letter-spacing: 5px;
  color: white;
}
.top-bar .menu a {
  color: rgba(255,255,255,0.7);
  margin-left: 35px;
  font-size: 11px;
  letter-spacing: 2px;
}
.top-bar .menu a:hover {
  color: white;
}
.full-screen {
  height: 100vh;
  background: url('images/qingdao-hero.jpeg') center/cover;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  position: relative;
}
.full-screen::before {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(26,58,92,0.4);
}
.full-screen .title {
  position: relative;
  z-index: 1;
  color: white;
}
.full-screen h1 {
  font-size: 80px;
  font-weight: 200;
  letter-spacing: 20px;
  margin-bottom: 10px;
}
.full-screen .subtitle {
  font-size: 12px;
  letter-spacing: 8px;
  opacity: 0.8;
  margin-bottom: 50px;
}
.full-screen .btns {
  position: relative;
  z-index: 1;
  display: flex;
  gap: 20px;
}
.full-screen .btns a {
  color: white;
  padding: 12px 30px;
  border: 1px solid white;
  font-size: 11px;
  letter-spacing: 2px;
}
.full-screen .btns a:hover {
  background: white;
  color: #1a3a5c;
}
</style>
</head>
<body>
  <div class="top-bar">
    <a href="index.html" class="logo">QINGDAO</a>
    <div class="menu">
      <a href="beach.html">BEACH</a>
      <a href="church.html">CHURCH</a>
      <a href="brewery.html">BREWERY</a>
    </div>
  </div>

  <div class="full-screen">
    <div class="title">
      <h1>QINGDAO</h1>
      <p class="subtitle">PEARL OF THE YELLOW SEA</p>
    </div>
    <div class="btns">
      <a href="beach.html">BADAGUANG BEACH</a>
      <a href="church.html">ST. NICHOLAS CHURCH</a>
      <a href="brewery.html">TSINGTAO BREWERY</a>
    </div>
  </div>
</body>
</html>
